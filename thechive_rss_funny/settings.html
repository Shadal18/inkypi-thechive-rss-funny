<div class="form-group">
  <label for="show_title" class="form-label">Show Title Bar</label>
  <input type="checkbox" id="show_title" name="show_title" value="1" class="form-input" checked />
  <small>Show the post title in a bar at the bottom of the image.</small>
</div>

<hr style="border: 0; border-top: 1px solid rgba(0, 0, 0, 0.12); margin: 24px 0 18px" />

<div class="form-group" style="margin-bottom: 20px">
  <div
    style="
      font-size: 0.95rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #555;
      margin-bottom: 10px;
    "
  >
    Plugin Repository
  </div>

  <div style="background: #f8f9fa; border: 1px solid #dcdfe3; border-radius: 10px; padding: 14px 16px">
    <a
      href="https://github.com/shadal18/inkypi-thechive-rss-funny"
      target="_blank"
      rel="noopener noreferrer"
      style="
        color: #0d6efd;
        text-decoration: none;
        font-weight: 600;
        font-size: 1rem;
        word-break: break-word;
        display: inline-block;
        margin-bottom: 6px;
      "
    >
      github.com/shadal18/inkypi-thechive-rss-funny
    </a>

    <div style="font-size: 0.9rem; color: #666">Setup help, updates, release notes, and source code.</div>
  </div>
</div>

<style>
  .floatingchat-container-wrap,
  .floating-chat-kofi-popup-iframe {
    left: unset !important;
    right: 16px !important;
  }

  .floatingchat-container-wrap {
    bottom: 14px !important;
  }

  .floating-chat-kofi-popup-iframe {
    bottom: 76px !important;
  }
</style>

<script src="https://storage.ko-fi.com/cdn/scripts/overlay-widget.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const showTitleInput = document.getElementById("show_title")

    if (typeof loadPluginSettings !== "undefined" && loadPluginSettings && typeof pluginSettings !== "undefined") {
      if (showTitleInput) {
        showTitleInput.checked = pluginSettings.show_title === "1"
      }
    } else {
      if (showTitleInput) {
        showTitleInput.checked = true
      }
    }

    if (typeof kofiWidgetOverlay !== "undefined") {
      kofiWidgetOverlay.draw("shadal", {
        type: "floating-chat",
        "floating-chat.donateButton.text": "I ❤️ Coffee",
        "floating-chat.donateButton.background-color": "#00b9fe",
        "floating-chat.donateButton.text-color": "#fff",
      })
    }
  })
</script>
